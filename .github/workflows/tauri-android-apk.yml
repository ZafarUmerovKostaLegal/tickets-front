# Tauri v2: генерирует gen/android (init --ci) и собирает APK.
# Локально нужны Android SDK, NDK, JAVA_HOME, ANDROID_HOME, NDK_HOME — см. https://v2.tauri.app/start/prerequisites/#android

name: Tauri Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: tauri-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b
          local-cache: true

      - name: Restore NDK symlinks (Linux)
        if: runner.os == 'Linux'
        run: |
          directory="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          if [ -d "$directory" ]; then
            find "$directory" -type l | while read -r link; do
              current_target=$(readlink "$link")
              new_target="$directory/$(basename "$current_target")"
              ln -sf "$new_target" "$link"
            done
          fi

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Android and NDK environment
        run: |
          {
            echo "ANDROID_HOME=$ANDROID_SDK_ROOT"
            echo "NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}"
          } >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      # Проект уже содержит src-tauri/gen/android/; повторный init может перезаписать кастомный app/build.gradle.kts
      # (подпись release). При отсутствии android-цели выполните локально: npx tauri android init --ci

      - name: Build APK
        run: npx tauri android build --ci --apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/**/outputs/apk/**
          if-no-files-found: warn
